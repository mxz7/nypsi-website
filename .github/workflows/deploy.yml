name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: use node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: generate .svelte-kit files
        run: npx svelte-kit sync

      - name: generate prisma client
        run: npx prisma generate

      - name: check formatting
        run: pnpm format --check

      - name: run pnpm check
        run: pnpm run check

  build:
    needs: checks
    runs-on: ubuntu-latest
    env:
      IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}

    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup docker buildx
        uses: docker/setup-buildx-action@v4

      - name: login to container registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}:${{ github.sha }},${{ env.IMAGE_PREFIX }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_TAG: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}

    steps:
      - name: deploy to server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOST }}
          username: dokku
          port: 22
          key: ${{ secrets.PRIV_KEY }}
          script: git:from-image nypsi-website ${{ env.IMAGE_TAG }}
